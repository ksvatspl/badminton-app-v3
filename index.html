<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro (Firebase Ultimate)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
            --header-height: 60px;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        
        .page-header {
            position: sticky; top: 0; background-color: var(--bg-body); z-index: 100;
            padding: 15px; margin: 0; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            height: var(--header-height); box-sizing: border-box;
        }
        .page-header h2 {
            border-left: 4px solid var(--accent); padding-left: 10px; margin: 0;
            font-size: 1.1rem; display: flex; align-items: center; gap: 10px; width: 100%;
        }

        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; animation: fadeIn 0.15s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .game-label { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        
        .txt-p { color: var(--cls-p) !important; } .txt-s { color: var(--cls-s) !important; } 
        .txt-n { color: var(--cls-n) !important; } .txt-bg { color: var(--cls-bg) !important; } 
        .txt-bb { color: var(--cls-bb) !important; }

        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 8px; border-left: 5px solid transparent; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #4f545c; cursor: not-allowed; }
        .btn-main.saved { background: #4f545c; opacity: 0.8; }
        
        .btn-danger { background: var(--danger); width: 100%; padding: 14px; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-danger:disabled { background: #4f545c; opacity: 0.5; cursor: not-allowed; }
        
        .btn-mini { background: #5865f2; color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; margin-left: auto; }
        .btn-edit { background: var(--warning); color: #000; width: 100%; padding: 8px; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; display: none; cursor: pointer; font-size: 0.85rem; }

        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-choice { flex: 1; padding: 12px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .btn-choice.selected { border-color: var(--accent) !important; background: rgba(67, 181, 129, 0.2) !important; color: var(--accent) !important; font-weight: bold; }

        .btn-status { border: none; border-radius: 6px; padding: 6px 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; margin: auto; width: 100%; }
        .btn-out { background: rgba(240, 71, 71, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-in { background: rgba(67, 181, 129, 0.15); color: var(--accent); border: 1px solid var(--accent); }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 15px; }
        .vs-text { color: var(--danger); font-weight: bold; font-size: 1.1rem; text-align: center; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .dot-active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .dot-off { background: var(--danger); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 15px; width: 90%; max-width: 400px; max-height: 80vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .btn-close-modal { font-size: 32px; color: var(--text-dim); cursor: pointer; }
        .modal-row { display: grid; grid-template-columns: 1fr 60px 80px; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 200; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.85rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        /* สไตล์พิเศษสำหรับเลขสถิติ */
        .stat-main { font-weight: bold; color: var(--text-main); font-size: 1rem; }
        .stat-sub { font-size: 0.75rem; color: var(--text-dim); opacity: 0.7; margin-left: 2px; }
    </style>
</head>
<body>

<div id="deleteModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--danger);">⚠️ ยืนยันการลบข้อมูล</h3>
            <span class="btn-close-modal" onclick="closeDeleteModal()">&times;</span>
        </div>
        <div class="modal-body" style="text-align: center;">
            <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">พิมพ์คำว่า <strong style="color:white;">delete</strong> เพื่อยืนยัน</p>
            <input type="text" id="deleteConfirmInput" placeholder="พิมพ์ delete" onkeyup="checkDeleteInput()" style="text-align: center;">
            <button class="btn-danger" id="btnConfirmDelete" onclick="executeDelete()" disabled>ยืนยันการลบ</button>
        </div>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--accent);">📊 สถิติย่อ (เกมที่เล่น)</h3>
            <span class="btn-close-modal" onclick="closeStats()">&times;</span>
        </div>
        <div class="modal-body" id="miniStatsList" style="padding: 0 20px;"></div>
        <div style="padding: 12px; background: #2f3136; border-top: 1px solid var(--border);">
            <button class="btn-main" style="padding: 10px;" onclick="closeStats()">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<div id="page1" class="page active">
    <div class="page-header">
        <h2>👥 จัดการผู้เล่น <span id="loading-indicator" style="font-size:0.7rem; color:var(--warning);">ซิงค์...</span></h2>
    </div>
    <div class="container">
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class" onchange="applyColor(this)">
                <option value="BB">BB</option><option value="BB+">BB+</option><option value="BG">BG</option><option value="BG+">BG+</option><option value="N">N</option><option value="N+">N+</option><option value="S">S</option><option value="S+">S+</option><option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ (ถ้ามี)">
            <button class="btn-main" id="btn-reg" onclick="registerMember()">+ เพิ่มชื่อสมาชิก</button>
        </div>
        <div class="card" style="padding: 5px;">
            <table style="width:100%; border-collapse:collapse; font-size: 0.9rem;" id="memberListBody"></table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header">
        <h2>🏸 จดผล <button class="btn-mini" onclick="openStats()">📊 สถิติย่อ</button></h2>
    </div>
    <div class="container">
        <div id="matchContainer"></div>
        <button id="btnAddNext" class="btn-main" style="background:transparent; border:2px dashed var(--border); color:var(--text-dim);" onclick="addNewMatchBox(true)">+ เพิ่มเกมถัดไป</button>
    </div>
</div>

<div id="page3" class="page">
    <div class="page-header">
        <h2>⚙️ ตั้งค่าระบบ</h2>
    </div>
    <div class="container">
        <div class="card" style="text-align: center;">
            <p style="color: var(--text-dim); margin-top: 0; font-size: 0.9rem;">ลบข้อมูลประจำวัน (รีเซ็ตก่อนเริ่มก๊วนใหม่)</p>
            <button class="btn-danger" style="background-color: var(--warning); color: #000;" onclick="openDeleteModal('matches')">🗑️ 1. ลบแมตช์การเล่นทั้งหมด</button>
            <button class="btn-danger" onclick="openDeleteModal('members')">🗑️ 2. ลบรายชื่อผู้เล่นทั้งหมด</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
    <div class="nav-item" onclick="showPage(3)">ตั้งค่า</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAM_cIiH6GR3N47H3Ydtma7fhSI_Hvk3Gk",
        authDomain: "badminton-hub-99b35.firebaseapp.com",
        projectId: "badminton-hub-99b35",
        storageBucket: "badminton-hub-99b35.firebasestorage.app",
        messagingSenderId: "488493837313",
        appId: "1:488493837313:web:054096949a9ed4db7f6400"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.allDataMemory = [];
    window.gameCount = 0;
    window.isHistoryLoaded = false;
    window.deleteTarget = ""; 
    
    let fireMembers = [];
    let fireMatches = [];

    const membersQuery = query(collection(db, "members"));
    const matchesQuery = query(collection(db, "matches"), orderBy("timestamp", "asc"));

    onSnapshot(membersQuery, (snapshot) => {
        fireMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        processData();
    });

    onSnapshot(matchesQuery, (snapshot) => {
        fireMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        // ทุกครั้งที่ข้อมูล Match เปลี่ยน ให้สั่ง Render ใหม่ทันที
        window.isHistoryLoaded = false; 
        processData();
    });

    function processData() {
        let statsMap = {};
        fireMembers.forEach(m => {
            statsMap[m.name] = { id: m.id, Name: m.name, Class: m.class, Status: m.status, Note: m.note, TotalPlayed: 0, Win: 0, Loss: 0 };
        });

        fireMatches.forEach(m => {
            const updateStat = (p, isWin) => { if(p && statsMap[p]) { statsMap[p].TotalPlayed++; if(isWin) statsMap[p].Win++; else statsMap[p].Loss++; } };
            if(m.winner === 'Team A') { updateStat(m.p1a, true); updateStat(m.p2a, true); updateStat(m.p1b, false); updateStat(m.p2b, false); }
            else if (m.winner === 'Team B') { updateStat(m.p1a, false); updateStat(m.p2a, false); updateStat(m.p1b, true); updateStat(m.p2b, true); }
        });

        const statsArray = Object.values(statsMap);
        const matchArray = fireMatches.map(m => ({ id: m.id, Type: "MatchHistory", P1A: m.p1a, P2A: m.p2a, P1B: m.p1b, P2B: m.p2b, Winner: m.winner }));
        window.allDataMemory = [...statsArray, ...matchArray];

        const loadingInd = document.getElementById('loading-indicator');
        if(loadingInd) loadingInd.style.display = 'none';
        window.renderAll();
    }

    window.registerMember = async function() {
        const nameInput = document.getElementById('mem_name');
        const classInput = document.getElementById('mem_class');
        const noteInput = document.getElementById('mem_note');
        if(!nameInput.value) return;
        const btn = document.getElementById('btn-reg');
        btn.disabled = true;
        await addDoc(collection(db, "members"), { name: nameInput.value.trim(), class: classInput.value, note: noteInput.value, status: "Active" });
        nameInput.value = ""; noteInput.value = ""; btn.disabled = false;
    };

    window.quickStatusUpdate = async function(name, action) {
        const member = fireMembers.find(m => m.name === name);
        if(member) {
            const newStatus = action === "checkout" ? "Inactive" : "Active";
            await updateDoc(doc(db, "members", member.id), { status: newStatus });
        }
    };

    window.saveMatchBox = async function(id) {
        const box = document.getElementById(`match-box-${id}`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        const p1a = box.querySelector('[data-role="p1a"]').value;
        if (!winner || !p1a) return alert("ข้อมูลไม่ครบ!");
        const btn = box.querySelector('.btn-main');
        btn.disabled = true;
        const matchData = { p1a: p1a, p2a: box.querySelector('[data-role="p2a"]').value, p1b: box.querySelector('[data-role="p1b"]').value, p2b: box.querySelector('[data-role="p2b"]').value, winner: winner };
        const docId = box.dataset.docid;
        if(docId) { await updateDoc(doc(db, "matches", docId), matchData); }
        else { await addDoc(collection(db, "matches"), { ...matchData, timestamp: serverTimestamp() }); }
    };

    window.executeDelete = async function() {
        const btn = document.getElementById('btnConfirmDelete');
        btn.disabled = true;
        try {
            const snapshot = await getDocs(collection(db, window.deleteTarget));
            const deletePromises = snapshot.docs.map(d => deleteDoc(doc(db, window.deleteTarget, d.id)));
            await Promise.all(deletePromises);
            if (window.deleteTarget === 'matches') { window.isHistoryLoaded = false; document.getElementById('matchContainer').innerHTML = ""; }
        } catch (error) { alert('Error: ' + error.message); }
        window.closeDeleteModal();
    }
</script>

<script>
    window.renderAll = function() {
        renderCombinedList();
        updateDropdowns();
        // โหลดประวัติเสมอถ้าอยู่ในหน้า 2 และยังไม่ได้โหลด
        if (document.getElementById('page2').classList.contains('active')) {
            renderMatchHistory();
        }
    }

    window.showPage = function(num) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page' + num).classList.add('active');
        document.querySelectorAll('.nav-item')[num-1].classList.add('active');
        window.scrollTo(0, 0);
        if(num === 2) { window.isHistoryLoaded = false; renderMatchHistory(); }
    }

    function updateDropdowns() {
        const activeMembers = window.allDataMemory.filter(m => m.Status === "Active");
        let options = '<option value="">- เลือก -</option>';
        activeMembers.forEach(m => { options += `<option value="${m.Name}">${m.Name} [${m.Class}]</option>`; });
        document.querySelectorAll('#matchContainer .p-select').forEach(s => { 
            if(!s.disabled) { const cur = s.value; s.innerHTML = options; s.value = cur; if(cur) window.applyColor(s); } 
        });
    }

    function renderCombinedList() {
        const tbody = document.getElementById('memberListBody');
        const members = window.allDataMemory.filter(i => i.TotalPlayed !== undefined);
        let sorted = members.sort((a, b) => {
            if (a.Status === "Active" && b.Status !== "Active") return -1;
            if (a.Status !== "Active" && b.Status === "Active") return 1;
            return b.TotalPlayed - a.TotalPlayed;
        });

        if (sorted.length === 0) { tbody.innerHTML = `<tr><td style="padding:15px; text-align:center;">ยังไม่มีสมาชิก</td></tr>`; return; }

        let html = "";
        sorted.forEach(m => {
            const isActive = m.Status === "Active";
            const winRate = m.TotalPlayed > 0 ? Math.round((m.Win / m.TotalPlayed) * 100) : 0;
            const statHtml = m.TotalPlayed > 0 ? `<span class="stat-main">${m.TotalPlayed}</span><span class="stat-sub">(${winRate}%)</span>` : `<span class="stat-sub">-</span>`;
            
            html += `<tr style="border-bottom:1px solid var(--border);">
                <td style="padding:12px 5px; width: 42%;">
                    <div style="display: flex; align-items: center;">
                        <span class="status-dot ${isActive ? "dot-active" : "dot-off"}"></span>
                        <div style="line-height: 1.2;">
                            <b>${m.Name}</b><br>
                            ${m.Note ? `<small style="color:var(--text-dim); font-size: 0.7rem;">${m.Note}</small>` : ''}
                        </div>
                    </div>
                </td>
                <td class="${window.getTxtClass(m.Class)}" style="text-align:center; width: 13%;">${m.Class}</td>
                <td style="text-align:center; width: 25%;">${statHtml}</td>
                <td style="text-align:right; width: 20%; padding-right:5px;">
                    <button class="btn-status ${isActive ? "btn-out" : "btn-in"}" onclick="quickStatusUpdate('${m.Name}', '${isActive ? "checkout" : "undo"}')">${isActive ? "🚪 ออก" : "🏸 เข้า"}</button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function renderMatchHistory() {
        if (window.isHistoryLoaded) return;
        const container = document.getElementById('matchContainer');
        const historyData = window.allDataMemory.filter(item => item.Type === "MatchHistory");
        container.innerHTML = ""; 
        window.gameCount = 0;
        
        historyData.forEach((m) => {
            window.gameCount++;
            const box = createMatchElement(window.gameCount);
            box.dataset.docid = m.id; 
            container.appendChild(box);
            const b = document.getElementById(`match-box-${window.gameCount}`);
            const selects = b.querySelectorAll('.p-select');
            [m.P1A, m.P2A, m.P1B, m.P2B].forEach((name, i) => {
                if(name) { const opt = document.createElement('option'); opt.value = name; opt.text = name; selects[i].add(opt); selects[i].value = name; }
            });
            const btnGroup = b.querySelector('.btn-group');
            btnGroup.dataset.winner = m.Winner;
            const winBtn = Array.from(btnGroup.querySelectorAll('.btn-choice')).find(btn => (m.Winner === 'Team A' && btn.innerText.includes('A')) || (m.Winner === 'Team B' && btn.innerText.includes('B')));
            if(winBtn) winBtn.classList.add('selected');
            const btnSave = b.querySelector('.btn-main');
            btnSave.innerText = "บันทึกแล้ว"; btnSave.classList.add('saved'); btnSave.disabled = true;
            b.querySelector('.btn-edit').style.display = 'block';
            b.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = true);
        });
        window.isHistoryLoaded = true;
        addNewMatchBox();
    }

    function createMatchElement(id) {
        const div = document.createElement('div'); div.className = 'card'; div.id = `match-box-${id}`;
        div.innerHTML = `<div class="game-label">เกมที่ ${id}</div><div class="match-grid"><div><select class="p-select" onchange="applyColor(this)" data-role="p1a"></select><select class="p-select" onchange="applyColor(this)" data-role="p2a"></select></div><div class="vs-text">VS</div><div><select class="p-select" onchange="applyColor(this)" data-role="p1b"></select><select class="p-select" onchange="applyColor(this)" data-role="p2b"></select></div></div><div class="btn-group"><button class="btn-choice" onclick="setBoxWin(this, 'Team A')">A ชนะ</button><button class="btn-choice" onclick="setBoxWin(this, 'Team B')">B ชนะ</button></div><button class="btn-main" onclick="saveMatchBox(${id})">บันทึกผล</button><button class="btn-edit" onclick="editMatchBox(${id})">✎ แก้ไข</button>`;
        return div;
    }

    window.addNewMatchBox = function(shouldScroll = false) {
        window.gameCount++;
        const container = document.getElementById('matchContainer');
        container.appendChild(createMatchElement(window.gameCount));
        updateDropdowns();
        if(shouldScroll) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.getTxtClass = function(cls) {
        if(!cls) return "";
        if(cls.includes('P')) return "txt-p"; if(cls.includes('S')) return "txt-s";
        if(cls.includes('N')) return "txt-n"; if(cls.includes('BG')) return "txt-bg";
        return "txt-bb";
    }

    window.applyColor = function(el) {
        if (!el || el.selectedIndex < 0) return;
        el.className = "p-select";
        const val = el.options[el.selectedIndex].text;
        const clsMatch = val.match(/\[(.*?)\]/);
        const cls = clsMatch ? clsMatch[1] : el.value;
        const colorClass = window.getTxtClass(cls);
        el.classList.add(colorClass);
        const colorCode = getComputedStyle(document.documentElement).getPropertyValue('--cls-' + (colorClass.split('-')[1] || 'bb'));
        el.style.borderLeftColor = colorCode;
    }

    window.editMatchBox = function(id) {
        const box = document.getElementById(`match-box-${id}`);
        box.querySelector('.btn-main').disabled = false; box.querySelector('.btn-main').innerText = "อัปเดตผล";
        box.querySelector('.btn-main').classList.remove('saved'); box.querySelector('.btn-edit').style.display = 'none';
        box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = false);
    }

    window.setBoxWin = function(btn, team) {
        btn.parentElement.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); btn.parentElement.dataset.winner = team;
    }

    window.openStats = function() { document.getElementById('statsModal').style.display = "flex"; renderMiniStats(); }
    window.closeStats = function() { document.getElementById('statsModal').style.display = "none"; }
    
    function renderMiniStats() {
        const stats = window.allDataMemory.filter(i => i.TotalPlayed !== undefined);
        let sorted = stats.sort((a, b) => b.TotalPlayed - a.TotalPlayed);
        let html = "";
        sorted.forEach(m => { if(m.Name) html += `<div class="modal-row"><div><b>${m.Name}</b></div><div class="${window.getTxtClass(m.Class)}" style="text-align:center;">${m.Class}</div><div style="text-align:right;"><b>${m.TotalPlayed}</b> เกม</div></div>`; });
        document.getElementById('miniStatsList').innerHTML = html || "<div style='padding:20px; text-align:center;'>ไม่มีข้อมูล</div>";
    }

    window.openDeleteModal = function(target) {
        window.deleteTarget = target;
        document.getElementById('deleteConfirmInput').value = "";
        document.getElementById('btnConfirmDelete').disabled = true;
        document.getElementById('deleteModal').style.display = "flex";
    }

    window.closeDeleteModal = function() { document.getElementById('deleteModal').style.display = "none"; }

    window.checkDeleteInput = function() {
        const input = document.getElementById('deleteConfirmInput').value;
        document.getElementById('btnConfirmDelete').disabled = (input !== "delete");
    }
</script>
</body>
</html>
