<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro (V5.4 - Absolute Order)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a; --info: #5865f2;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .page-header { position: sticky; top: 0; background-color: var(--bg-body); z-index: 100; padding: 15px; border-bottom: 1px solid var(--border); height: 60px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; }
        .page-header h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin: 0; font-size: 1.1rem; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; } .page.active { display: block; }
        
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; transition: all 0.3s ease; border: 2px solid transparent; }
        .card.hidden-match { display: none !important; }
        .card.state-live { border-color: var(--accent); background: #36393f; box-shadow: 0 0 15px rgba(67, 181, 129, 0.2); }
        .card.state-saved { opacity: 0.6; border-color: #202225; } /* หรี่แสงลงเมื่อจบเกม */
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-item { background: #36393f; padding: 12px 5px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .dash-val { display: block; font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        .dash-label { font-size: 0.65rem; color: var(--text-dim); }

        .game-label { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; z-index: 10; }
        .txt-p { color: var(--cls-p) !important; } .txt-s { color: var(--cls-s) !important; } 
        .txt-n { color: var(--cls-n) !important; } .txt-bg { color: var(--cls-bg) !important; } 
        .txt-bb { color: var(--cls-bb) !important; }
        
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #202225; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 8px; border-left: 5px solid transparent; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:disabled { background: #4f545c; opacity: 0.6; cursor: not-allowed; }
        .btn-live { background: var(--info); } 
        
        .btn-add-manual { width: 100%; padding: 15px; background: var(--warning); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; margin-bottom: 20px; }
        .btn-status { border: none; border-radius: 6px; padding: 6px 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-out { background: rgba(240, 71, 71, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .btn-in { background: rgba(67, 181, 129, 0.15); color: var(--accent); border: 1px solid var(--accent); }

        .header-btns { display: flex; gap: 8px; }
        .btn-mini { background: #5865f2; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-choice { flex: 1; padding: 10px; background: #202225; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-choice.selected { background: rgba(67, 181, 129, 0.2); border-color: var(--accent); color: var(--accent); }
        .btn-choice:disabled { cursor: not-allowed; opacity: 0.7; }
        
        .btn-saved-compact { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); padding: 8px; font-size: 0.85rem; border-radius: 8px; width: 100%; text-align: center; margin-top: 5px; font-weight: bold; }
        .btn-edit-link { background: transparent; border: none; color: var(--warning); font-size: 0.75rem; text-decoration: underline; margin-top: 8px; display: none; width: 100%; cursor: pointer; text-align: center; }
        
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table th { color: var(--text-dim); font-size: 0.7rem; padding: 10px 4px; border-bottom: 1px solid var(--border); text-align: center; }
        .m-table th.sortable:hover { color: white; cursor: pointer; }
        .m-table td { padding: 12px 4px; border-bottom: 1px solid #36393f; font-size: 0.9rem; text-align: center; }
        
        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .dot-active { background: var(--accent); } .dot-off { background: var(--danger); }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .vs-text { color: var(--danger); font-weight: bold; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 200; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="page-header"><h2>👥 จัดการผู้เล่น</h2></div>
    <div class="container">
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class">
                <option value="BB">BB</option><option value="BB+">BB+</option><option value="BG">BG</option><option value="BG+">BG+</option><option value="N">N</option><option value="N+">N+</option><option value="S">S</option><option value="S+">S+</option><option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ">
            <button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>
        </div>
        <div class="card" style="padding: 5px;">
            <table class="m-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="setSort('name')" style="text-align:left; padding-left:10px;">ชื่อ <span id="sort-name"></span></th>
                        <th class="sortable" onclick="setSort('class')">คลาส <span id="sort-class"></span></th>
                        <th class="sortable" onclick="setSort('played')">เกม <span id="sort-played">🔽</span></th>
                        <th class="sortable" onclick="setSort('win')">Win% <span id="sort-win"></span></th>
                        <th>สถานะ</th>
                    </tr>
                </thead>
                <tbody id="memberListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header">
        <h2>🏸 จดผล</h2>
        <div class="header-btns">
            <button id="toggleHideBtn" onclick="toggleHideSaved()" class="btn-mini">👁️ ซ่อนที่จบแล้ว</button>
            <button onclick="openStats()" class="btn-mini">📊 สถิติ</button>
        </div>
    </div>
    <div class="container">
        <div id="matchContainer"></div>
        <button id="btnAddManual" class="btn-add-manual" onclick="addNewManualBox()">+ เพิ่มเกมใหม่ (Manual)</button>
    </div>
</div>

<div id="page3" class="page">
    <div class="page-header"><h2>⚙️ ตั้งค่า</h2></div>
    <div class="container">
        <div class="dash-grid">
            <div class="dash-item"><span class="dash-val" id="stat-matches">0</span><span class="dash-label">แมตช์</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-active">0</span><span class="dash-label">เล่นอยู่</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-total">0</span><span class="dash-label">ทั้งหมด</span></div>
        </div>
        <div class="card" style="text-align: center;">
            <button class="btn-main" style="background:var(--warning); color:#000; margin-bottom:15px;" onclick="openDeleteModal('matches')">🗑️ ลบแมตช์ทั้งหมด</button>
            <button class="btn-main" style="background:var(--danger);" onclick="openDeleteModal('members')">🗑️ ลบสมาชิกทั้งหมด</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
    <div class="nav-item" onclick="showPage(3)">ตั้งค่า</div>
</nav>

<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-height: 300px; width: 85%;">
        <div class="modal-body" style="text-align: center; padding: 20px;">
            <h3 style="color:var(--danger);">⚠️ ยืนยันการลบ</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem;">พิมพ์ <strong>delete</strong> เพื่อล้างข้อมูล</p>
            <input type="text" id="deleteConfirmInput" onkeyup="checkDeleteInput()" style="text-align: center;">
            <button class="btn-main" id="btnConfirmDelete" onclick="executeDelete()" disabled style="background:var(--danger); margin-bottom:10px;">ยืนยันลบทั้งหมด</button>
            <button class="btn-main" style="background:#4f545c;" onclick="closeDeleteModal()">ยกเลิก</button>
        </div>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <div style="padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; color:var(--accent);">📊 สถิติเกม</h3>
            <span style="font-size: 24px; cursor: pointer; color: var(--text-dim);" onclick="closeStats()">&times;</span>
        </div>
        <div style="overflow-y: auto; padding: 10px;">
            <table class="m-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="setMiniSort('name')" style="text-align:left; padding-left:10px;">ชื่อ <span id="ms-name"></span></th>
                        <th class="sortable" onclick="setMiniSort('class')">คลาส <span id="ms-class"></span></th>
                        <th class="sortable" onclick="setMiniSort('played')">เกม <span id="ms-played">🔽</span></th>
                        <th class="sortable" onclick="setMiniSort('win')">Win% <span id="ms-win"></span></th>
                    </tr>
                </thead>
                <tbody id="miniStatsTableBody"></tbody>
            </table>
        </div>
        <div style="padding: 10px;"><button class="btn-main" onclick="closeStats()">ปิด</button></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAM_cIiH6GR3N47H3Ydtma7fhSI_Hvk3Gk",
        authDomain: "badminton-hub-99b35.firebaseapp.com",
        projectId: "badminton-hub-99b35",
        storageBucket: "badminton-hub-99b35.firebasestorage.app",
        messagingSenderId: "488493837313",
        appId: "1:488493837313:web:054096949a9ed4db7f6400"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.allDataMemory = [];
    window.fireMembers = [];
    window.fireMatches = [];
    window.hideSavedMatches = false;
    window.currentSort = { col: 'played', order: 'desc' };
    window.miniSort = { col: 'played', order: 'desc' };

    onSnapshot(collection(db, "members"), (snapshot) => {
        window.fireMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
    });

    onSnapshot(query(collection(db, "matches")), (snapshot) => {
        window.fireMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
        if(document.getElementById('page2').classList.contains('active')) {
            renderMatchHistoryStrict();
        }
    });

    function calculateStats() {
        let statsMap = {};
        window.fireMembers.forEach(m => { statsMap[m.name] = { id: m.id, Name: m.name, Class: m.class, Status: m.status, TotalPlayed: 0, Win: 0, Loss: 0 }; });
        window.fireMatches.forEach(m => {
            const update = (p, isWin) => { if(p && statsMap[p]) { statsMap[p].TotalPlayed++; if(isWin) statsMap[p].Win++; else statsMap[p].Loss++; } };
            if(m.winner === 'Team A') { update(m.p1a, true); update(m.p2a, true); update(m.p1b, false); update(m.p2b, false); }
            else if(m.winner === 'Team B') { update(m.p1a, false); update(m.p2a, false); update(m.p1b, true); update(m.p2b, true); }
        });
        window.allDataMemory = Object.values(statsMap);
        renderMemberList();
        updateDash();
    }

    window.registerMember = async function() {
        const n = document.getElementById('mem_name'), c = document.getElementById('mem_class'), nt = document.getElementById('mem_note');
        if(!n.value.trim()) return;
        await addDoc(collection(db, "members"), { name: n.value.trim(), class: c.value, note: nt.value, status: "Active" });
        n.value = ""; nt.value = "";
    };

    window.saveMatchBox = async function(btn) {
        const box = btn.closest('.card');
        const winner = box.querySelector('.btn-group').dataset.winner || "";
        const selects = box.querySelectorAll('.p-select');
        const players = Array.from(selects).map(s => s.value);
        
        if(players.includes("")) return alert("กรุณาเลือกผู้เล่นให้ครบ 4 คน!");

        const isDraft = !box.dataset.docid;
        btn.disabled = true; btn.innerText = "กำลังบันทึก...";

        try {
            if (isDraft) {
                // สร้างเอกสารใหม่ (Draft -> Live หรือ Finished)
                const data = { 
                    p1a: players[0], p2a: players[1], p1b: players[2], p2b: players[3], 
                    winner: winner, 
                    birth: parseInt(box.dataset.birth) // ล็อกเวลาเกิด ส่งไปเซฟใน DB
                };
                // เก็บ timestamp ด้วยเผื่อต้องการดูย้อนหลัง แต่ไม่ใช้เรียงลำดับแล้ว
                data.timestamp = serverTimestamp(); 
                
                const docRef = await addDoc(collection(db, "matches"), data);
                box.dataset.docid = docRef.id;
            } else {
                // อัปเดตข้อมูล (Live -> Finished หรือ แก้ไข)
                // ไม่มีการอัปเดต timestamp เพื่อรักษาตำแหน่ง
                const data = { 
                    p1a: players[0], p2a: players[1], p1b: players[2], p2b: players[3], 
                    winner: winner 
                };
                await updateDoc(doc(db, "matches", box.dataset.docid), data);
                delete box.dataset.editing;
            }
        } catch(e) {
            console.error(e);
            alert("บันทึกไม่สำเร็จ กรุณาลองใหม่");
            btn.disabled = false;
            btn.innerText = box.classList.contains('state-live') ? "✅ จบเกม" : "🏸 ลงสนาม";
        }
    };

    window.quickStatusUpdate = async function(name, action) {
        const m = window.fireMembers.find(i => i.name === name);
        if(m) await updateDoc(doc(db, "members", m.id), { status: action === "checkout" ? "Inactive" : "Active" });
    };

    window.executeDelete = async function() {
        const snapshot = await getDocs(collection(db, window.deleteTarget));
        await Promise.all(snapshot.docs.map(d => deleteDoc(doc(db, window.deleteTarget, d.id))));
        closeDeleteModal();
    };
</script>

<script>
    const classWeight = { "P":9, "S+":8, "S":7, "N+":6, "N":5, "BG+":4, "BG":3, "BB+":2, "BB":1 };
    
    window.getDotEmoji = (cls) => {
        if(!cls) return "⚪";
        if(cls.includes('P')) return "🟣"; if(cls.includes('S')) return "🔴";
        if(cls.includes('N')) return "🟠"; if(cls.includes('BG')) return "🔵";
        return "🟢";
    };

    window.getPartnerCount = (p1, p2) => {
        let count = 0;
        window.fireMatches.forEach(m => {
            if((m.p1a===p1 && m.p2a===p2) || (m.p1a===p2 && m.p2a===p1)) count++;
            if((m.p1b===p1 && m.p2b===p2) || (m.p1b===p2 && m.p2b===p1)) count++;
        });
        return count;
    };

    window.getTxtClass = (cls) => {
        if(!cls) return ""; cls = cls.toUpperCase();
        if(cls.includes('P')) return "txt-p"; if(cls.includes('S')) return "txt-s";
        if(cls.includes('N')) return "txt-n"; if(cls.includes('BG')) return "txt-bg";
        return "txt-bb";
    };

    window.getSortFn = (sortObj) => (a, b) => {
        let valA, valB;
        if(sortObj.col === 'name') { valA = a.Name; valB = b.Name; }
        else if(sortObj.col === 'class') { valA = classWeight[a.Class]||0; valB = classWeight[b.Class]||0; }
        else if(sortObj.col === 'played') { valA = a.TotalPlayed; valB = b.TotalPlayed; }
        else if(sortObj.col === 'win') { valA = a.TotalPlayed?(a.Win/a.TotalPlayed):0; valB = b.TotalPlayed?(b.Win/b.TotalPlayed):0; }
        if(valA < valB) return sortObj.order === 'asc' ? -1 : 1;
        if(valA > valB) return sortObj.order === 'asc' ? 1 : -1;
        return 0;
    };

    window.setSort = (col) => {
        if(window.currentSort.col === col) window.currentSort.order = window.currentSort.order === 'asc' ? 'desc' : 'asc';
        else { window.currentSort.col = col; window.currentSort.order = 'desc'; }
        ['name', 'class', 'played', 'win'].forEach(id => document.getElementById(`sort-${id}`).innerText = "");
        document.getElementById(`sort-${col}`).innerText = window.currentSort.order === 'asc' ? " 🔼" : " 🔽";
        renderMemberList();
    };

    window.setMiniSort = (col) => {
        if(window.miniSort.col === col) window.miniSort.order = window.miniSort.order === 'asc' ? 'desc' : 'asc';
        else { window.miniSort.col = col; window.miniSort.order = 'desc'; }
        ['name', 'class', 'played', 'win'].forEach(id => document.getElementById(`ms-${id}`).innerText = "");
        document.getElementById(`ms-${col}`).innerText = window.miniSort.order === 'asc' ? " 🔼" : " 🔽";
        renderMiniStats();
    };

    window.renderMemberList = () => {
        const tbody = document.getElementById('memberListBody');
        let html = "";
        const activeM = window.allDataMemory.filter(m => m.Status === "Active").sort(getSortFn(window.currentSort));
        const inactiveM = window.allDataMemory.filter(m => m.Status !== "Active").sort(getSortFn(window.currentSort));
        [...activeM, ...inactiveM].forEach(m => {
            const isActive = m.Status === "Active";
            const wr = m.TotalPlayed > 0 ? Math.round((m.Win/m.TotalPlayed)*100) : 0;
            html += `<tr><td style="text-align:left; padding-left:10px;"><span class="status-dot ${isActive?'dot-active':'dot-off'}"></span><b>${m.Name}</b></td><td class="${getTxtClass(m.Class)}">${m.Class}</td><td><b>${m.TotalPlayed}</b></td><td>${wr}%</td><td><button class="btn-status ${isActive?'btn-out':'btn-in'}" onclick="quickStatusUpdate('${m.Name}','${isActive?'checkout':'undo'}')">${isActive?'ออก':'เข้า'}</button></td></tr>`;
        });
        tbody.innerHTML = html;
    };

    window.renderMatchHistoryStrict = () => {
        const container = document.getElementById('matchContainer');
        const matches = window.fireMatches;
        let combined = [];

        // 1. ดึงข้อมูลจาก Database
        matches.forEach(m => {
            combined.push({ type: 'db', birth: m.birth || (m.timestamp ? m.timestamp.toMillis() : 0), data: m });
        });

        // 2. ดึงกล่อง Draft ที่ค้างอยู่ในหน้าจอ
        Array.from(container.querySelectorAll('.card:not([data-docid])')).forEach(box => {
            combined.push({ type: 'dom', birth: parseInt(box.dataset.birth || "0"), el: box });
        });

        // 3. เรียงลำดับตามเวลาเกิด (ล็อกตายตัว)
        combined.sort((a, b) => a.birth - b.birth);

        // 4. สร้างหรืออัปเดตกล่องใน DOM ตามลำดับ
        combined.forEach(item => {
            if (item.type === 'db') {
                let box = container.querySelector(`[data-docid="${item.data.id}"]`);
                if (!box) { box = createMatchElement(); box.dataset.docid = item.data.id; }
                container.appendChild(box);
                
                box.dataset.birth = item.birth;
                if (box.dataset.editing === "true") return;

                const m = item.data;
                const isFinished = !!m.winner;

                // รีเซ็ตคลาสสถานะ
                box.classList.remove('state-live', 'state-saved', 'hidden-match');
                
                // จัดการรายชื่อ (ล็อก)
                const selects = box.querySelectorAll('.p-select');
                const players = [m.p1a, m.p2a, m.p1b, m.p2b];
                selects.forEach((sel, i) => {
                    sel.innerHTML = `<option value="${players[i]}">${players[i]}</option>`;
                    sel.value = players[i]; sel.disabled = true;
                    applyColorManual(sel, players[i]);
                });

                // จัดการปุ่มผู้ชนะ
                const btnGroup = box.querySelector('.btn-group');
                btnGroup.dataset.winner = m.winner || "";
                btnGroup.querySelectorAll('.btn-choice').forEach(b => {
                    b.classList.remove('selected');
                    if(isFinished) {
                        b.classList.toggle('selected', (m.winner==='Team A' && b.innerText==='A ชนะ') || (m.winner==='Team B' && b.innerText==='B ชนะ'));
                        b.disabled = true;
                    } else {
                        b.disabled = false;
                    }
                });

                // จัดการปุ่มหลักตาม State
                let mainBtn = box.querySelector('.btn-main');
                let savedDiv = box.querySelector('.btn-saved-compact');
                const editLink = box.querySelector('.btn-edit-link');

                if (isFinished) {
                    // สถานะที่ 3: จบเกม
                    box.classList.add('state-saved');
                    if (window.hideSavedMatches) box.classList.add('hidden-match');
                    
                    if (mainBtn) {
                        savedDiv = document.createElement('div'); 
                        savedDiv.className = 'btn-saved-compact';
                        savedDiv.innerText = '✓ จบเกมแล้ว'; 
                        mainBtn.replaceWith(savedDiv);
                    }
                    if (editLink) { editLink.style.display = 'block'; editLink.innerText = "⚙️ แก้ไขข้อมูล"; }
                } else {
                    // สถานะที่ 2: ลงสนาม
                    box.classList.add('state-live');
                    if (savedDiv) {
                        mainBtn = document.createElement('button');
                        mainBtn.className = 'btn-main';
                        savedDiv.replaceWith(mainBtn);
                    }
                    if (mainBtn) {
                        mainBtn.innerText = "✅ จบเกม";
                        mainBtn.classList.remove('btn-live');
                        mainBtn.onclick = () => saveMatchBox(mainBtn);
                    }
                    if (editLink) { editLink.style.display = 'block'; editLink.innerText = "✏️ แก้ไขรายชื่อ"; }
                }

            } else {
                // สถานะที่ 1: Draft
                item.el.classList.remove('hidden-match');
                container.appendChild(item.el);
            }
        });

        // ล้างกล่องที่ถูกลบออกจาก Database ไปแล้ว
        Array.from(container.querySelectorAll('.card[data-docid]')).forEach(box => {
            if(!matches.find(m => m.id === box.dataset.docid)) box.remove();
        });

        window.updateBoxNumbers();
    };

    window.updateBoxNumbers = () => {
        const container = document.getElementById('matchContainer');
        container.querySelectorAll('.card').forEach((box, idx) => {
            const num = idx + 1;
            box.id = `match-box-${num}`;
            box.querySelector('.game-label').innerText = `เกมที่ ${num}`;
            const mainBtn = box.querySelector('.btn-main');
            if (mainBtn) {
                mainBtn.onclick = () => saveMatchBox(mainBtn);
            }
            const editLink = box.querySelector('.btn-edit-link');
            if (editLink) editLink.onclick = () => editMatch(editLink);
            
            if(!box.dataset.docid || box.dataset.editing === "true") {
                if (box.querySelectorAll('.p-select')[0].options.length <= 1 || box.dataset.editing === "true") {
                    box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
                }
            }
        });
    }

    window.addNewManualBox = () => {
        const container = document.getElementById('matchContainer');
        const box = createMatchElement();
        container.appendChild(box);
        window.updateBoxNumbers();
    };

    window.createMatchElement = () => {
        const div = document.createElement('div'); 
        div.className = 'card';
        div.dataset.birth = Date.now(); // สร้างเวลาล็อกตำแหน่งทันที!
        div.innerHTML = `
            <div class="game-label">เกมที่ -</div>
            <div class="match-grid">
                <div>
                    <select class="p-select" data-role="p1a" onchange="handleSel(this)"></select>
                    <select class="p-select" data-role="p2a" onchange="handleSel(this)"></select>
                </div>
                <div class="vs-text">VS</div>
                <div>
                    <select class="p-select" data-role="p1b" onchange="handleSel(this)"></select>
                    <select class="p-select" data-role="p2b" onchange="handleSel(this)"></select>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-choice" onclick="setWin(this,'Team A')">A ชนะ</button>
                <button class="btn-choice" onclick="setWin(this,'Team B')">B ชนะ</button>
            </div>
            <button class="btn-main btn-live" onclick="saveMatchBox(this)">🏸 ลงสนาม</button>
            <button class="btn-edit-link" style="display:none;"></button>`;
        return div;
    };

    window.refreshSelectOptionsManual = (selectEl) => {
        const curVal = selectEl.value;
        const box = selectEl.closest('.card');
        const role = selectEl.dataset.role;
        const allSelectedInBox = Array.from(box.querySelectorAll('.p-select')).map(s => s.value).filter(v => v !== "" && v !== curVal);
        let partnerVal = "";
        if(role==='p1a') partnerVal = box.querySelector('[data-role="p2a"]').value;
        if(role==='p2a') partnerVal = box.querySelector('[data-role="p1a"]').value;
        if(role==='p1b') partnerVal = box.querySelector('[data-role="p2b"]').value;
        if(role==='p2b') partnerVal = box.querySelector('[data-role="p1b"]').value;

        let options = '<option value="">- เลือก -</option>';
        window.allDataMemory.filter(m => m.Status === "Active").forEach(m => {
            if(allSelectedInBox.includes(m.Name)) return;
            let text = `${window.getDotEmoji(m.Class)} ${m.Name} [${m.Class}]`;
            if(partnerVal && m.Name !== partnerVal) {
                const pc = window.getPartnerCount(m.Name, partnerVal);
                if(pc > 0) text += ` 🤝${pc > 1 ? '×'+pc : ''}`;
            }
            options += `<option value="${m.Name}" ${m.Name === curVal ? 'selected' : ''}>${text}</option>`;
        });
        selectEl.innerHTML = options;
        applyColorManual(selectEl, selectEl.value);
    };

    window.applyColorManual = (el, name) => {
        const m = window.allDataMemory.find(i => i.Name === name);
        const colorClass = m ? getTxtClass(m.Class) : "";
        el.style.borderLeftColor = colorClass ? getComputedStyle(document.documentElement).getPropertyValue('--cls-'+colorClass.split('-')[1]) : 'transparent';
    };

    window.handleSel = (el) => {
        const box = el.closest('.card');
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.setWin = (btn, team) => {
        if(btn.disabled && !btn.closest('.card').classList.contains('state-live') && btn.closest('.card').dataset.editing !== "true") return;
        btn.parentElement.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); btn.parentElement.dataset.winner = team;
    };

    window.toggleHideSaved = () => {
        window.hideSavedMatches = !window.hideSavedMatches;
        document.getElementById('toggleHideBtn').innerText = window.hideSavedMatches ? "👁️ แสดงทั้งหมด" : "👁️ ซ่อนที่จบแล้ว";
        renderMatchHistoryStrict();
    };

    window.updateDash = () => {
        document.getElementById('stat-matches').innerText = window.fireMatches.length;
        document.getElementById('stat-active').innerText = window.fireMembers.filter(m=>m.status==="Active").length;
        document.getElementById('stat-total').innerText = window.fireMembers.length;
    };

    window.showPage = (n) => {
        document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i+1===n));
        document.querySelectorAll('.nav-item').forEach((p,i) => p.classList.toggle('active', i+1===n));
        if(n===2) renderMatchHistoryStrict();
    };

    window.renderMiniStats = () => {
        let html = "";
        [...window.allDataMemory].sort(getSortFn(window.miniSort)).forEach(m => {
            const wr = m.TotalPlayed ? Math.round((m.Win/m.TotalPlayed)*100) : 0;
            html += `<tr><td style="text-align:left; padding-left:10px;"><b>${m.Name}</b></td><td class="${getTxtClass(m.Class)}">${m.Class}</td><td><b>${m.TotalPlayed}</b></td><td>${wr}%</td></tr>`;
        });
        document.getElementById('miniStatsTableBody').innerHTML = html;
    };

    window.openStats = () => {
        document.getElementById('statsModal').style.display="flex";
        renderMiniStats();
    };
    window.closeStats = () => document.getElementById('statsModal').style.display="none";
    window.openDeleteModal = (t) => { window.deleteTarget=t; document.getElementById('deleteConfirmInput').value=""; document.getElementById('btnConfirmDelete').disabled=true; document.getElementById('deleteModal').style.display="flex"; };
    window.closeDeleteModal = () => document.getElementById('deleteModal').style.display="none";
    window.checkDeleteInput = () => document.getElementById('btnConfirmDelete').disabled = document.getElementById('deleteConfirmInput').value!=="delete";

    window.editMatch = (btn) => {
        const box = btn.closest('.card');
        box.dataset.editing = "true";
        box.classList.remove('state-saved', 'state-live');
        box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = false);
        
        const saved = box.querySelector('.btn-saved-compact');
        if(saved) {
            const newBtn = document.createElement('button'); 
            newBtn.className='btn-main'; newBtn.innerText='อัปเดตผล';
            saved.replaceWith(newBtn);
        } else {
            const mainBtn = box.querySelector('.btn-main');
            if (mainBtn) mainBtn.innerText = 'อัปเดตผล';
        }
        
        box.querySelector('.btn-edit-link').style.display = 'none';
        window.updateBoxNumbers(); 
    };
</script>
</body>
</html>
