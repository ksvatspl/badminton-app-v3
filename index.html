<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro (V4.1 - UX Refined)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        
        .page-header { position: sticky; top: 0; background-color: var(--bg-body); z-index: 100; padding: 15px; border-bottom: 1px solid var(--border); height: 60px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; }
        .page-header h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }

        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; animation: fadeIn 0.15s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; }
        .game-label { position: absolute; top: -10px; right: 20px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-item { background: #36393f; padding: 12px 5px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .dash-val { display: block; font-size: 1.3rem; font-weight: bold; color: var(--accent); }
        .dash-label { font-size: 0.65rem; color: var(--text-dim); }

        .txt-p { color: var(--cls-p) !important; } .txt-s { color: var(--cls-s) !important; } 
        .txt-n { color: var(--cls-n) !important; } .txt-bg { color: var(--cls-bg) !important; } 
        .txt-bb { color: var(--cls-bb) !important; }

        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 8px; border-left: 5px solid transparent; }
        
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #4f545c; cursor: not-allowed; opacity: 0.6; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-choice { flex: 1; padding: 10px; background: #36393f; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-choice.selected { background: rgba(67, 181, 129, 0.2); border-color: var(--accent); color: var(--accent); }
        .btn-choice:disabled { opacity: 0.5; cursor: default; }

        .btn-saved-compact { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 8px; font-size: 0.75rem; border-radius: 8px; width: 100%; text-align: center; margin-top: 5px; }
        .btn-edit-link { background: transparent; border: none; color: var(--warning); font-size: 0.75rem; text-decoration: underline; cursor: pointer; width: 100%; margin-top: 8px; display: none; }

        .btn-mini { background: #5865f2; color: white; border: none; border-radius: 6px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; }
        .btn-danger { background: var(--danger); width: 100%; padding: 14px; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        .btn-status { border: none; border-radius: 6px; padding: 6px 4px; font-size: 0.7rem; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-out { background: rgba(240, 71, 71, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-in { background: rgba(67, 181, 129, 0.1); color: var(--accent); border: 1px solid var(--accent); }

        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .vs-text { color: var(--danger); font-weight: bold; font-size: 1.1rem; text-align: center; }

        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .dot-active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .dot-off { background: var(--danger); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 5px 15px; overflow-y: auto; flex: 1; }
        .btn-close-modal { font-size: 32px; color: var(--text-dim); cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 200; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table th { color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; padding: 8px 4px; border-bottom: 1px solid var(--border); }
        .m-table td { padding: 10px 4px; border-bottom: 1px solid #36393f; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="deleteModal" class="modal">
    <div class="modal-content" style="max-height: 300px; width: 85%;">
        <div class="modal-body" style="text-align: center; padding-top: 30px;">
            <h3 style="margin:0 0 10px 0; color:var(--danger);">⚠️ ยืนยันการลบ</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem;">พิมพ์ <strong style="color:white;">delete</strong> เพื่อล้างข้อมูล</p>
            <input type="text" id="deleteConfirmInput" placeholder="พิมพ์ตรงนี้" onkeyup="checkDeleteInput()" style="text-align: center;">
            <button class="btn-danger" id="btnConfirmDelete" onclick="executeDelete()" disabled>ยืนยันลบทั้งหมด</button>
            <button class="btn-main" style="background:#4f545c; padding: 10px; margin-top:5px;" onclick="closeDeleteModal()">ยกเลิก</button>
        </div>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--accent);">📊 สถิติเกมที่เล่น</h3>
            <span class="btn-close-modal" onclick="closeStats()">&times;</span>
        </div>
        <div class="modal-body">
            <table class="m-table">
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:10px;">ชื่อ</th>
                        <th style="width:15%;">คลาส</th>
                        <th style="width:15%;">เกม</th>
                        <th style="width:20%;">Win%</th>
                    </tr>
                </thead>
                <tbody id="miniStatsTableBody"></tbody>
            </table>
        </div>
        <div style="padding: 12px; background: #2f3136; border-top: 1px solid var(--border);">
            <button class="btn-main" style="padding: 10px;" onclick="closeStats()">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<div id="page1" class="page active">
    <div class="page-header"><h2>👥 จัดการผู้เล่น</h2></div>
    <div class="container">
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class" onchange="applyColor(this)">
                <option value="BB">BB</option><option value="BB+">BB+</option><option value="BG">BG</option><option value="BG+">BG+</option><option value="N">N</option><option value="N+">N+</option><option value="S">S</option><option value="S+">S+</option><option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ">
            <button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>
        </div>
        <div class="card" style="padding: 10px 5px;">
            <table class="m-table">
                <thead>
                    <tr>
                        <th style="text-align:left; padding-left:15px;">ชื่อ</th>
                        <th style="width:12%;">คลาส</th>
                        <th style="width:12%;">เกม</th>
                        <th style="width:15%;">Win%</th>
                        <th style="width:18%;">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="memberListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header">
        <h2>🏸 จดผล</h2>
        <button class="btn-mini" onclick="openStats()">📊 สถิติย่อ</button>
    </div>
    <div class="container">
        <div id="matchContainer"></div>
        <button id="btnAddNext" class="btn-main" style="background:transparent; border:2px dashed var(--border); color:var(--text-dim);" onclick="addNewMatchBox(true)">+ เพิ่มเกมใหม่</button>
    </div>
</div>

<div id="page3" class="page">
    <div class="page-header"><h2>⚙️ ตั้งค่า & สรุป</h2></div>
    <div class="container">
        <div class="dash-grid" id="dashBoard">
            <div class="dash-item"><span class="dash-val" id="stat-matches">0</span><span class="dash-label">แมตช์</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-active">0</span><span class="dash-label">เล่นอยู่</span></div>
            <div class="dash-item"><span class="dash-val" id="stat-total">0</span><span class="dash-label">สมาชิก</span></div>
        </div>
        <div class="card" style="text-align: center;">
            <p style="color: var(--text-dim); margin-bottom: 15px; font-size: 0.85rem;">รีเซ็ตข้อมูลประจำวัน</p>
            <button class="btn-danger" style="background-color: var(--warning); color: #000;" onclick="openDeleteModal('matches')">🗑️ ลบแมตช์ทั้งหมด</button>
            <button class="btn-danger" onclick="openDeleteModal('members')">🗑️ ลบสมาชิกทั้งหมด</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
    <div class="nav-item" onclick="showPage(3)">ตั้งค่า</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAM_cIiH6GR3N47H3Ydtma7fhSI_Hvk3Gk",
        authDomain: "badminton-hub-99b35.firebaseapp.com",
        projectId: "badminton-hub-99b35",
        storageBucket: "badminton-hub-99b35.firebasestorage.app",
        messagingSenderId: "488493837313",
        appId: "1:488493837313:web:054096949a9ed4db7f6400"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.allDataMemory = [];
    window.gameCount = 0;
    window.isHistoryLoaded = false;
    let fireMembers = [];
    let fireMatches = [];

    onSnapshot(query(collection(db, "members")), (snapshot) => {
        fireMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        processData();
    });

    onSnapshot(query(collection(db, "matches"), orderBy("timestamp", "asc")), (snapshot) => {
        fireMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        processData();
    });

    function processData() {
        let statsMap = {};
        fireMembers.forEach(m => { statsMap[m.name] = { id: m.id, Name: m.name, Class: m.class, Status: m.status, Note: m.note, TotalPlayed: 0, Win: 0, Loss: 0 }; });
        fireMatches.forEach(m => {
            const updateStat = (p, isWin) => { if(p && statsMap[p]) { statsMap[p].TotalPlayed++; if(isWin) statsMap[p].Win++; else statsMap[p].Loss++; } };
            if(m.winner === 'Team A') { updateStat(m.p1a, true); updateStat(m.p2a, true); updateStat(m.p1b, false); updateStat(m.p2b, false); }
            else if (m.winner === 'Team B') { updateStat(m.p1a, false); updateStat(m.p2a, false); updateStat(m.p1b, true); updateStat(m.p2b, true); }
        });
        window.allDataMemory = [...Object.values(statsMap), ...fireMatches.map(m => ({ id: m.id, Type: "MatchHistory", ...m }))];
        if(document.getElementById('stat-matches')) {
            document.getElementById('stat-matches').innerText = fireMatches.length;
            document.getElementById('stat-active').innerText = fireMembers.filter(m => m.status === "Active").length;
            document.getElementById('stat-total').innerText = fireMembers.length;
        }
        window.renderAll();
    }

    window.registerMember = async function() {
        const n = document.getElementById('mem_name'); const c = document.getElementById('mem_class'); const nt = document.getElementById('mem_note');
        if(!n.value.trim()) return;
        if(fireMembers.some(m => m.name.toLowerCase() === n.value.trim().toLowerCase())) return alert(`ชื่อนี้มีแล้วครับ!`);
        await addDoc(collection(db, "members"), { name: n.value.trim(), class: c.value, note: nt.value, status: "Active" });
        n.value = ""; nt.value = "";
    };

    window.quickStatusUpdate = async function(name, action) {
        const m = fireMembers.find(i => i.name === name);
        if(m) await updateDoc(doc(db, "members", m.id), { status: action === "checkout" ? "Inactive" : "Active" });
    };

    window.saveMatchBox = async function(id) {
        const box = document.getElementById(`match-box-${id}`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        const players = Array.from(box.querySelectorAll('.p-select')).map(s => s.value).filter(v => v !== "");
        if (players.length < 4 || !winner) return alert("กรุณากรอกข้อมูลให้ครบครับ");
        
        const data = { p1a: players[0], p2a: players[1], p1b: players[2], p2b: players[3], winner };
        if(box.dataset.docid) await updateDoc(doc(db, "matches", box.dataset.docid), data);
        else await addDoc(collection(db, "matches"), { ...data, timestamp: serverTimestamp() });
        // บันทึกสำเร็จ ไม่ต้องรัน render ใหม่ทั้งหน้า เพราะ Snapshot จะจัดการเงียบๆ
    };

    window.executeDelete = async function() {
        const snapshot = await getDocs(collection(db, window.deleteTarget));
        await Promise.all(snapshot.docs.map(d => deleteDoc(doc(db, window.deleteTarget, d.id))));
        if (window.deleteTarget === 'matches') { window.isHistoryLoaded = false; document.getElementById('matchContainer').innerHTML = ""; }
        window.closeDeleteModal();
    };
</script>

<script>
    window.getDotColor = function(cls) {
        if(!cls) return "🟢";
        const c = cls.toUpperCase();
        if(c.includes('P')) return "🟣";
        if(c.includes('S')) return "🔴";
        if(c.includes('N')) return "🟠";
        if(c.includes('BG')) return "🔵";
        return "🟢";
    }

    window.getPartnerCount = function(p1, p2) {
        if(!p1 || !p2 || p1 === p2) return 0;
        let count = 0;
        window.allDataMemory.forEach(m => {
            if (m.Type === "MatchHistory") {
                if ((m.p1a === p1 && m.p2a === p2) || (m.p1a === p2 && m.p2a === p1)) count++;
                if ((m.p1b === p1 && m.p2b === p2) || (m.p1b === p2 && m.p2b === p1)) count++;
            }
        });
        return count;
    }

    window.refreshSelectOptions = function(selectEl) {
        if(!selectEl) return;
        const curVal = selectEl.value;
        const box = selectEl.closest('.card');
        const role = selectEl.dataset.role;
        
        // หาว่าใครที่ถูกเลือกไปแล้วในช่องอื่นในกล่องเดียวกัน
        const allSelectedInBox = Array.from(box.querySelectorAll('.p-select'))
                                     .map(s => s.value)
                                     .filter(val => val !== "" && val !== curVal);

        // หาคู่หูเพื่อเช็ค 🤝
        let partnerVal = "";
        if (role === 'p1a') partnerVal = box.querySelector('[data-role="p2a"]').value;
        if (role === 'p2a') partnerVal = box.querySelector('[data-role="p1a"]').value;
        if (role === 'p1b') partnerVal = box.querySelector('[data-role="p2b"]').value;
        if (role === 'p2b') partnerVal = box.querySelector('[data-role="p1b"]').value;

        selectEl.innerHTML = '<option value="">- เลือก -</option>';
        
        const activeMembers = window.allDataMemory.filter(m => m.Status === "Active");
        activeMembers.forEach(m => {
            // ถ้าชื่อถูกเลือกไปแล้วในช่องอื่น (ยกเว้นช่องตัวเอง) ไม่ต้องแสดง
            if (allSelectedInBox.includes(m.Name)) return;

            const dot = window.getDotColor(m.Class);
            let text = `${dot} ${m.Name} [${m.Class}]`;
            
            if (partnerVal && m.Name !== partnerVal) {
                const pCount = window.getPartnerCount(m.Name, partnerVal);
                if (pCount > 0) text += `  🤝${pCount > 1 ? '×'+pCount : ''}`;
            }
            
            const opt = document.createElement('option');
            opt.value = m.Name;
            opt.text = text;
            selectEl.appendChild(opt);
        });
        
        selectEl.value = curVal;
        window.applyColor(selectEl);
    }

    window.handleSelectChange = function(el) {
        const box = el.closest('.card');
        // เมื่อมีการเปลี่ยนคน ให้ Refresh ทุก Dropdown ในกล่องนั้นทันที เพื่อเอาชื่อที่ถูกเลือกออก/คืนกลับมา
        box.querySelectorAll('.p-select').forEach(s => {
            if(!s.disabled) window.refreshSelectOptions(s);
        });
    }

    window.renderAll = function() {
        renderCombinedList();
        if (document.getElementById('page2').classList.contains('active')) {
            renderMatchHistory();
        }
    }

    window.showPage = function(num) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page' + num).classList.add('active');
        document.querySelectorAll('.nav-item')[num-1].classList.add('active');
        if(num === 2) { 
            window.isHistoryLoaded = false; 
            renderMatchHistory();
            // Scroll ลงล่างสุดเมื่อเปิดหน้าจดผล
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }
    }

    window.updateDropdowns = function() {
        document.querySelectorAll('#matchContainer .p-select').forEach(s => { 
            if(!s.disabled) window.refreshSelectOptions(s);
        });
    }

    function renderCombinedList() {
        const tbody = document.getElementById('memberListBody');
        const members = window.allDataMemory.filter(i => i.TotalPlayed !== undefined);
        let sorted = members.sort((a, b) => (a.Status === "Active" ? -1 : 1) || (b.TotalPlayed - a.TotalPlayed));
        let html = "";
        sorted.forEach(m => {
            const isActive = m.Status === "Active";
            const wr = m.TotalPlayed > 0 ? Math.round((m.Win / m.TotalPlayed) * 100) : 0;
            html += `<tr><td style="padding-left:10px;"><div style="display:flex; align-items:center;"><span class="status-dot ${isActive ? "dot-active" : "dot-off"}"></span><div style="line-height:1.1;"><b>${m.Name}</b><br><small style="color:var(--text-dim); font-size:0.65rem;">${m.Note||''}</small></div></div></td><td class="${window.getTxtClass(m.Class)}" style="text-align:center;">${m.Class}</td><td style="text-align:center; font-weight:bold;">${m.TotalPlayed || '-'}</td><td style="text-align:center; color:var(--text-dim); font-size:0.8rem;">${m.TotalPlayed > 0 ? wr+'%' : '-'}</td><td><button class="btn-status ${isActive ? "btn-out" : "btn-in"}" onclick="quickStatusUpdate('${m.Name}', '${isActive ? "checkout" : "undo"}')">${isActive ? "ออก" : "เข้า"}</button></td></tr>`;
        });
        tbody.innerHTML = html || '<tr><td colspan="5" style="text-align:center; padding:20px;">ไม่มีข้อมูล</td></tr>';
    }

    function renderMatchHistory() {
        if (window.isHistoryLoaded) return;
        const container = document.getElementById('matchContainer');
        const historyData = window.allDataMemory.filter(item => item.Type === "MatchHistory");
        container.innerHTML = ""; window.gameCount = 0;
        historyData.forEach((m) => {
            window.gameCount++;
            const box = createMatchElement(window.gameCount);
            box.dataset.docid = m.id; 
            container.appendChild(box);
            const b = document.getElementById(`match-box-${window.gameCount}`);
            const selects = b.querySelectorAll('.p-select');
            
            [m.p1a, m.p2a, m.p1b, m.p2b].forEach((name, i) => {
                if(name) { 
                    const opt = document.createElement('option'); 
                    opt.value = name; 
                    const mem = window.allDataMemory.find(x => x.Name === name);
                    const dot = mem ? window.getDotColor(mem.Class) : "⚪";
                    opt.text = `${dot} ${name} [${mem ? mem.Class : ''}]`;
                    selects[i].add(opt); selects[i].value = name; 
                    window.applyColor(selects[i]); 
                }
            });
            const btnGroup = b.querySelector('.btn-group');
            btnGroup.dataset.winner = m.winner;
            const winBtn = Array.from(btnGroup.querySelectorAll('.btn-choice')).find(btn => (m.winner === 'Team A' && btn.innerText.includes('A')) || (m.winner === 'Team B' && btn.innerText.includes('B')));
            if(winBtn) winBtn.classList.add('selected');
            b.querySelector('.btn-main').outerHTML = `<div class="btn-saved-compact">✓ บันทึกผลแล้ว</div>`;
            b.querySelector('.btn-edit-link').style.display = 'block';
            b.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = true);
        });
        window.isHistoryLoaded = true;
        addNewMatchBox();
    }

    function createMatchElement(id) {
        const div = document.createElement('div'); div.className = 'card'; div.id = `match-box-${id}`;
        div.innerHTML = `<div class="game-label">เกมที่ ${id}</div><div class="match-grid"><div><select class="p-select" onchange="handleSelectChange(this)" data-role="p1a"></select><select class="p-select" onchange="handleSelectChange(this)" data-role="p2a"></select></div><div class="vs-text">VS</div><div><select class="p-select" onchange="handleSelectChange(this)" data-role="p1b"></select><select class="p-select" onchange="handleSelectChange(this)" data-role="p2b"></select></div></div><div class="btn-group"><button class="btn-choice" onclick="setBoxWin(this, 'Team A')">A ชนะ</button><button class="btn-choice" onclick="setBoxWin(this, 'Team B')">B ชนะ</button></div><button class="btn-main" onclick="saveMatchBox(${id})">บันทึกผล</button><button class="btn-edit-link" onclick="editMatchBox(${id})">แก้ไขข้อมูล</button>`;
        return div;
    }

    window.addNewMatchBox = function(shouldScroll = false) {
        window.gameCount++;
        const box = createMatchElement(window.gameCount);
        document.getElementById('matchContainer').appendChild(box);
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptions(s));
        if(shouldScroll) window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    window.getTxtClass = function(cls) {
        if(!cls) return "";
        const c = cls.toUpperCase();
        if(c.includes('P')) return "txt-p"; if(c.includes('S')) return "txt-s";
        if(c.includes('N')) return "txt-n"; if(c.includes('BG')) return "txt-bg";
        return "txt-bb";
    }

    window.applyColor = function(el) {
        if (!el || el.selectedIndex <= 0) { el.style.borderLeftColor = 'transparent'; return; }
        el.className = "p-select";
        const val = el.options[el.selectedIndex].text;
        const clsMatch = val.match(/\[(.*?)\]/);
        const colorClass = window.getTxtClass(clsMatch ? clsMatch[1] : el.value);
        el.classList.add(colorClass);
        el.style.borderLeftColor = getComputedStyle(document.documentElement).getPropertyValue('--cls-' + (colorClass.split('-')[1] || 'bb'));
    }

    window.editMatchBox = function(id) {
        const box = document.getElementById(`match-box-${id}`);
        const savedTag = box.querySelector('.btn-saved-compact');
        if(savedTag) {
            const btn = document.createElement('button'); btn.className = 'btn-main'; btn.innerText = 'อัปเดตผล';
            btn.onclick = () => window.saveMatchBox(id);
            savedTag.replaceWith(btn);
        }
        box.querySelector('.btn-edit-link').style.display = 'none';
        box.querySelectorAll('select, .btn-choice').forEach(el => el.disabled = false);
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptions(s));
    }

    window.setBoxWin = function(btn, team) {
        if(btn.disabled) return;
        btn.parentElement.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); btn.parentElement.dataset.winner = team;
    }

    window.openStats = function() {
        document.getElementById('statsModal').style.display = "flex";
        const stats = window.allDataMemory.filter(i => i.TotalPlayed !== undefined);
        let sorted = stats.sort((a, b) => b.TotalPlayed - a.TotalPlayed);
        let html = "";
        sorted.forEach(m => { 
            if(m.Name) {
                const wr = m.TotalPlayed > 0 ? Math.round((m.Win / m.TotalPlayed) * 100) : 0;
                html += `<tr><td style="padding-left:10px;"><b>${m.Name}</b></td><td class="${window.getTxtClass(m.Class)}" style="text-align:center;">${m.Class}</td><td style="text-align:center; font-weight:bold;">${m.TotalPlayed || '-'}</td><td style="text-align:center; color:var(--text-dim); font-size:0.85rem;">${m.TotalPlayed > 0 ? wr+'%' : '-'}</td></tr>`;
            }
        });
        document.getElementById('miniStatsTableBody').innerHTML = html || "<tr><td colspan='4' style='padding:20px; text-align:center;'>ไม่มีข้อมูล</td></tr>";
    }
    window.closeStats = function() { document.getElementById('statsModal').style.display = "none"; }

    window.openDeleteModal = function(target) {
        window.deleteTarget = target;
        document.getElementById('deleteConfirmInput').value = "";
        document.getElementById('btnConfirmDelete').disabled = true;
        document.getElementById('deleteModal').style.display = "flex";
    }
    window.closeDeleteModal = function() { document.getElementById('deleteModal').style.display = "none"; }
    window.checkDeleteInput = function() { document.getElementById('btnConfirmDelete').disabled = (document.getElementById('deleteConfirmInput').value !== "delete"); }
</script>
</body>
</html>
