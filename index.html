<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 80px; }
        .page-header { position: sticky; top: 0; background: var(--bg-body); z-index: 100; padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; } .page.active { display: block; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; position: relative; border: 1px solid var(--border); }
        .game-label { position: absolute; top: -10px; right: 15px; background: var(--accent); color: white; padding: 2px 10px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #202225; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { border-left: 6px solid #40444b; transition: 0.2s; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-choice { flex: 1; padding: 10px; background: #202225; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-choice.selected { background: rgba(67, 181, 129, 0.2); border-color: var(--accent); color: var(--accent); }
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table td { padding: 12px 5px; border-bottom: 1px solid #36393f; text-align: center; }
        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        .vs-text { color: var(--danger); font-weight: bold; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
        .dot-active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        .dot-off { background: var(--danger); }
        .txt-p { color: var(--cls-p); } .txt-s { color: var(--cls-s); } .txt-n { color: var(--cls-n); } .txt-bg { color: var(--cls-bg); } .txt-bb { color: var(--cls-bb); }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="page-header"><h2>👥 สมาชิก</h2></div>
    <div class="container">
        <div class="card">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class">
                <option value="BB">BB</option><option value="BG">BG</option><option value="N">N</option><option value="S">S</option><option value="P">P</option>
            </select>
            <button class="btn-main" onclick="addMember()">เพิ่มสมาชิก</button>
        </div>
        <div class="card" style="padding:0">
            <table class="m-table"><tbody id="memberList"></tbody></table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header"><h2>🏸 จดผล</h2></div>
    <div class="container">
        <div class="card" id="inputCard">
            <div class="match-grid">
                <div><select class="p-select" id="p1a" onchange="updSel(this)"></select><select class="p-select" id="p2a" onchange="updSel(this)"></select></div>
                <div class="vs-text">VS</div>
                <div><select class="p-select" id="p1b" onchange="updSel(this)"></select><select class="p-select" id="p2b" onchange="updSel(this)"></select></div>
            </div>
            <div class="btn-group" id="winnerGroup">
                <button class="btn-choice" onclick="setWinner('Team A', this)">A ชนะ</button>
                <button class="btn-choice" onclick="setWinner('Team B', this)">B ชนะ</button>
            </div>
            <button class="btn-main" onclick="saveMatch()">บันทึกผลการแข่งขัน</button>
        </div>
        <div id="matchHistory"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyAM_cIiH6GR3N47H3Ydtma7fhSI_Hvk3Gk", authDomain: "badminton-hub-99b35.firebaseapp.com", projectId: "badminton-hub-99b35", storageBucket: "badminton-hub-99b35.firebasestorage.app", messagingSenderId: "488493837313", appId: "1:488493837313:web:054096949a9ed4db7f6400" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let members = []; let matches = []; let selectedWinner = "";

    // Sync Members
    onSnapshot(collection(db, "members"), (snap) => {
        members = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderMembers();
        fillDropdowns();
    });

    // Sync Matches
    onSnapshot(query(collection(db, "matches"), orderBy("time", "desc")), (snap) => {
        matches = snap.docs.map(d => ({id: d.id, ...d.data()}));
        renderMatches();
    });

    window.addMember = async () => {
        const name = document.getElementById('mem_name').value;
        const cls = document.getElementById('mem_class').value;
        if(!name) return;
        await addDoc(collection(db, "members"), { name, class: cls, status: "Active" });
        document.getElementById('mem_name').value = "";
    };

    window.toggleStatus = async (id, cur) => {
        await updateDoc(doc(db, "members", id), { status: cur === "Active" ? "Inactive" : "Active" });
    };

    window.setWinner = (val, btn) => {
        selectedWinner = val;
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    };

    window.saveMatch = async () => {
        const data = {
            p1a: document.getElementById('p1a').value, p2a: document.getElementById('p2a').value,
            p1b: document.getElementById('p1b').value, p2b: document.getElementById('p2b').value,
            winner: selectedWinner, time: Date.now()
        };
        if(!data.p1a || !data.p2a || !data.p1b || !data.p2b || !selectedWinner) return alert("กรอกข้อมูลให้ครบ");
        await addDoc(collection(db, "matches"), data);
        // Reset Form
        selectedWinner = "";
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected'));
    };

    function renderMembers() {
        const list = document.getElementById('memberList');
        list.innerHTML = members.map(m => {
            const cls = `txt-${m.class.toLowerCase()}`;
            const dot = m.status === "Active" ? "dot-active" : "dot-off";
            return `<tr><td style="text-align:left; padding-left:15px;"><span class="status-dot ${dot}"></span>${m.name}</td>
                    <td class="${cls}">${m.class}</td>
                    <td><button onclick="toggleStatus('${m.id}','${m.status}')" style="border:none; background:none; color:var(--text-dim); cursor:pointer;">${m.status==='Active'?'🔴 ออก':'🟢 เข้า'}</button></td></tr>`;
        }).join('');
    }

    function fillDropdowns() {
        const active = members.filter(m => m.status === "Active");
        const ids = ['p1a', 'p2a', 'p1b', 'p2b'];
        ids.forEach(id => {
            const el = document.getElementById(id);
            const cur = el.value;
            let h = `<option value="">- เลือก -</option>`;
            active.forEach(m => {
                const partnerName = getPartnerId(id);
                const count = getPartnerCount(m.name, partnerName);
                const partnerTag = count > 0 ? ` 🤝${count}` : "";
                h += `<option value="${m.name}" ${m.name===cur?'selected':''}>${m.name} [${m.class}]${partnerTag}</option>`;
            });
            el.innerHTML = h;
            updSel(el);
        });
    }

    function getPartnerId(id) {
        if(id==='p1a') return document.getElementById('p2a').value;
        if(id==='p2a') return document.getElementById('p1a').value;
        if(id==='p1b') return document.getElementById('p2b').value;
        if(id==='p2b') return document.getElementById('p1b').value;
        return "";
    }

    function getPartnerCount(p1, p2) {
        if(!p1 || !p2) return 0;
        return matches.filter(m => 
            ((m.p1a===p1 && m.p2a===p2) || (m.p1a===p2 && m.p2a===p1)) ||
            ((m.p1b===p1 && m.p2b===p2) || (m.p1b===p2 && m.p2b===p1))
        ).length;
    }

    window.updSel = (el) => {
        const m = members.find(i => i.name === el.value);
        if(m) {
            const color = getComputedStyle(document.documentElement).getPropertyValue(`--cls-${m.class.toLowerCase()}`);
            el.style.borderLeftColor = color;
        } else {
            el.style.borderLeftColor = "#40444b";
        }
        if(el.id) { // If it's the main input, refresh others for partner count
             const ids = ['p1a', 'p2a', 'p1b', 'p2b'];
             if(ids.includes(el.id)) {
                 // Prevent infinite loop by not calling fillDropdowns directly
             }
        }
    };

    function renderMatches() {
        const hist = document.getElementById('matchHistory');
        hist.innerHTML = matches.map((m, idx) => `
            <div class="card" style="opacity:0.8">
                <div class="game-label">จบเกม</div>
                <div class="match-grid">
                    <div style="${m.winner==='Team A'?'color:var(--accent); font-weight:bold':''}">${m.p1a}<br>${m.p2a}</div>
                    <div class="vs-text">VS</div>
                    <div style="${m.winner==='Team B'?'color:var(--accent); font-weight:bold':''}">${m.p1b}<br>${m.p2b}</div>
                </div>
            </div>
        `).join('');
    }

    window.showPage = (n) => {
        document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i+1===n));
        document.querySelectorAll('.nav-item').forEach((v,i) => v.classList.toggle('active', i+1===n));
    };
</script>
</body>
</html>
