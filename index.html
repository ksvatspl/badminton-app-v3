<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Hub Pro (V6.2 - Strict Internal Balance)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #1e2124; --bg-card: #2f3136; --text-main: #ffffff;
            --text-dim: #b9bbbe; --accent: #43b581; --danger: #f04747; --border: #40444b; --warning: #faa61a;
            --live: #5865f2;
            --cls-p: #ff66b2; --cls-s: #ff4d4d; --cls-n: #ffaa00; --cls-bg: #33ccff; --cls-bb: #44ffaa;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; padding-bottom: 90px; }
        .page-header { position: sticky; top: 0; background-color: var(--bg-body); z-index: 100; padding: 15px; border-bottom: 1px solid var(--border); height: 60px; box-sizing: border-box; display: flex; align-items: center; justify-content: space-between; }
        .page-header h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin: 0; font-size: 1.1rem; }
        .container { padding: 10px; max-width: 600px; margin: auto; }
        .page { display: none; } .page.active { display: block; }
        
        /* Match Card */
        .card { background: var(--bg-card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative; border-left: 4px solid transparent; transition: border 0.3s; }
        .card.is-live { border-left-color: var(--live); }
        .card.is-saved { border-left-color: var(--accent); }
        .card.hidden-match { display: none !important; }
        
        .status-badge { position: absolute; top: -8px; left: 15px; font-size: 0.6rem; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-live { background: var(--live); color: white; }
        .badge-saved { background: var(--accent); color: white; }
        .game-label { position: absolute; top: -10px; right: 20px; background: #202225; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; }
        
        /* Form & Selects */
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; background: #36393f; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .p-select { margin-bottom: 8px; border-left: 5px solid transparent; }
        .p-select:disabled { opacity: 0.9; color: var(--text-main); background: #202225; border-style: dashed; }
        
        /* Buttons */
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #4f545c; opacity: 0.6; cursor: not-allowed; }
        
        .action-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-suggest { flex: 0 0 55px; height: 50px; background: var(--warning); color: #000; border: none; border-radius: 10px; cursor: pointer; font-size: 1.6rem; display: flex; align-items: center; justify-content: center; }
        .btn-suggest:active { transform: scale(0.95); }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-choice { flex: 1; padding: 10px; background: #36393f; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-choice.selected { background: rgba(67, 181, 129, 0.2); border-color: var(--accent); color: var(--accent); }
        .btn-choice:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-saved-compact { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--accent); padding: 8px; font-size: 0.85rem; border-radius: 8px; width: 100%; text-align: center; margin-top: 5px; font-weight: bold; }
        .btn-edit-link { background: transparent; border: none; color: var(--warning); font-size: 0.75rem; text-decoration: underline; margin-top: 8px; display: none; width: 100%; cursor: pointer; }

        /* Tables & Lists */
        .m-table { width: 100%; border-collapse: collapse; }
        .m-table th { color: var(--text-dim); font-size: 0.65rem; padding: 10px 4px; border-bottom: 1px solid var(--border); text-align: center; }
        .m-table td { padding: 12px 4px; border-bottom: 1px solid #36393f; font-size: 0.85rem; text-align: center; vertical-align: middle; }
        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .dot-active { background: var(--accent); } .dot-off { background: var(--danger); }
        
        .match-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; margin-top: 5px; }
        .vs-text { color: var(--danger); font-weight: bold; text-align: center; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #202225; display: flex; border-top: 1px solid var(--border); padding: 10px 0; z-index: 200; }
        .nav-item { flex: 1; text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* Utility */
        .txt-p { color: var(--cls-p); } .txt-s { color: var(--cls-s); } .txt-n { color: var(--cls-n); } .txt-bg { color: var(--cls-bg); } .txt-bb { color: var(--cls-bb); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="page1" class="page active">
    <div class="page-header"><h2>👥 จัดการผู้เล่น</h2></div>
    <div class="container">
        <div class="card" id="memberFormCard">
            <input type="hidden" id="edit_mem_id">
            <input type="text" id="mem_name" placeholder="ชื่อเล่น">
            <select id="mem_class">
                <option value="BB">BB</option><option value="BB+">BB+</option><option value="BG">BG</option><option value="BG+">BG+</option><option value="N">N</option><option value="N+">N+</option><option value="S">S</option><option value="S+">S+</option><option value="P">P</option>
            </select>
            <input type="text" id="mem_note" placeholder="หมายเหตุ (เช่น ลำดับทีม)">
            <div id="formActions">
                <button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>
            </div>
        </div>
        <div class="card" style="padding: 5px;">
            <table class="m-table">
                <thead id="memberListHead"></thead>
                <tbody id="memberListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="page2" class="page">
    <div class="page-header">
        <h2>🏸 จดผล</h2>
        <div class="header-btns">
            <button id="toggleHideBtn" onclick="toggleHideSaved()" style="background:#5865f2; color:white; border:none; border-radius:6px; padding:6px 10px; font-size:0.75rem; font-weight:bold; cursor:pointer;">👁️ ซ่อนที่จบแล้ว</button>
            <button onclick="openStats()" style="background:#5865f2; color:white; border:none; border-radius:6px; padding:6px 10px; font-size:0.75rem; font-weight:bold; cursor:pointer;">📊 สถิติ</button>
        </div>
    </div>
    <div class="container">
        <div id="matchContainer"></div>
        <button class="btn-add-manual" style="width: 100%; padding: 15px; background: transparent; border: 2px dashed var(--border); color: var(--text-dim); border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;" onclick="addNewManualBox()">+ เพิ่มเกมใหม่ (Manual)</button>
    </div>
</div>

<div id="page3" class="page">
    <div class="page-header"><h2>⚙️ ตั้งค่า</h2></div>
    <div class="container">
        <div class="card" style="text-align: center;">
            <button class="btn-main" style="background:var(--warning); color:#000; margin-bottom:15px;" onclick="openDeleteModal('matches')">🗑️ ล้างแมตช์ทั้งหมด</button>
            <button class="btn-main" style="background:var(--danger);" onclick="openDeleteModal('members')">🗑️ ลบสมาชิกทั้งหมด</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage(1)">จัดการ</div>
    <div class="nav-item" onclick="showPage(2)">จดผล</div>
    <div class="nav-item" onclick="showPage(3)">ตั้งค่า</div>
</nav>

<div id="deleteModal" class="modal"><div class="modal-content" style="padding:20px; text-align:center;"><h3 style="color:var(--danger);">⚠️ ยืนยันการลบ</h3><p>พิมพ์ <b>delete</b> เพื่อลบ</p><input type="text" id="deleteConfirmInput" onkeyup="checkDeleteInput()" style="text-align:center;"><button class="btn-main" id="btnConfirmDelete" onclick="executeDelete()" disabled style="background:var(--danger); margin-bottom:10px;">ยืนยัน</button><button class="btn-main" style="background:#4f545c;" onclick="closeDeleteModal()">ยกเลิก</button></div></div>
<div id="statsModal" class="modal"><div class="modal-content"><div style="padding:15px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;"><h3 style="margin:0;">📊 สถิติ</h3><span style="font-size:24px; cursor:pointer;" onclick="closeStats()">&times;</span></div><div style="overflow-y:auto;"><table class="m-table"><thead id="statsListHead"></thead><tbody id="miniStatsTableBody"></tbody></table></div><div style="padding:10px;"><button class="btn-main" onclick="closeStats()">ปิด</button></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAM_cIiH6GR3N47H3Ydtma7fhSI_Hvk3Gk",
        authDomain: "badminton-hub-99b35.firebaseapp.com",
        projectId: "badminton-hub-99b35",
        storageBucket: "badminton-hub-99b35.firebasestorage.app",
        messagingSenderId: "488493837313",
        appId: "1:488493837313:web:054096949a9ed4db7f6400"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Global States
    window.allDataMemory = [];
    window.fireMembers = [];
    window.fireMatches = [];
    window.hideSavedMatches = false;
    window.currentSort = { key: 'TotalPlayed', direction: 'desc' };
    window.globalNextMatchNum = 1;

    // Firebase Sync
    onSnapshot(collection(db, "members"), (snapshot) => {
        window.fireMembers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
    });

    onSnapshot(query(collection(db, "matches"), orderBy("timestamp", "asc")), (snapshot) => {
        window.fireMatches = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        calculateStats();
        if(document.getElementById('page2').classList.contains('active')) renderMatchHistoryStrict();
    });

    function calculateStats() {
        let statsMap = {};
        window.fireMembers.forEach(m => { 
            statsMap[m.name] = { id: m.id, Name: m.name, Class: m.class, Note: m.note || "", Status: m.status, TotalPlayed: 0, Win: 0, Loss: 0, WinRate: 0 }; 
        });
        window.fireMatches.forEach(m => {
            if(m.matchStatus !== 'saved' && m.winner === undefined) return;
            const update = (p, isWin) => { if(p && statsMap[p]) { statsMap[p].TotalPlayed++; if(isWin) statsMap[p].Win++; else statsMap[p].Loss++; } };
            if(m.winner === 'Team A') { update(m.p1a, true); update(m.p2a, true); update(m.p1b, false); update(m.p2b, false); }
            else if(m.winner === 'Team B') { update(m.p1a, false); update(m.p2a, false); update(m.p1b, true); update(m.p2b, true); }
        });
        window.allDataMemory = Object.values(statsMap).map(m => {
            m.WinRate = m.TotalPlayed > 0 ? Math.round((m.Win/m.TotalPlayed)*100) : 0;
            return m;
        });
        renderMemberList();
    }

    // CRUD Ops
    window.registerMember = async function() {
        const n = document.getElementById('mem_name'), c = document.getElementById('mem_class'), nt = document.getElementById('mem_note');
        if(!n.value.trim()) return;
        await addDoc(collection(db, "members"), { name: n.value.trim(), class: c.value, note: nt.value, status: "Active" });
        n.value = ""; nt.value = "";
    };

    window.updateMemberData = async function() {
        const id = document.getElementById('edit_mem_id').value;
        const n = document.getElementById('mem_name').value.trim();
        const c = document.getElementById('mem_class').value;
        const nt = document.getElementById('mem_note').value;
        if(!id || !n) return;
        await updateDoc(doc(db, "members", id), { name: n, class: c, note: nt });
        cancelEditMember();
    };

    window.saveMatchBox = async function(matchNum, status = 'saved') {
        const box = document.querySelector(`.card[data-matchnum="${matchNum}"]`);
        const winner = box.querySelector('.btn-group').dataset.winner;
        const players = Array.from(box.querySelectorAll('.p-select')).map(s => s.value);
        if(status === 'live' && players.includes("")) return alert("เลือกคนให้ครบ!");
        if(status === 'saved' && (!winner || players.includes(""))) return alert("ใส่ผลชนะและคนเล่นให้ครบ!");

        const data = { matchNum: parseInt(matchNum), p1a: players[0], p2a: players[1], p1b: players[2], p2b: players[3], winner: winner || null, matchStatus: status, timestamp: serverTimestamp() };
        if(box.dataset.docid) await updateDoc(doc(db, "matches", box.dataset.docid), data);
        else await addDoc(collection(db, "matches"), data);
        delete box.dataset.editing;
    };

    window.quickStatusUpdate = async function(name, action) {
        const m = window.fireMembers.find(i => i.name === name);
        if(m) await updateDoc(doc(db, "members", m.id), { status: action === "checkout" ? "Inactive" : "Active" });
    };

    window.executeDelete = async function() {
        const snapshot = await getDocs(collection(db, window.deleteTarget));
        await Promise.all(snapshot.docs.map(d => deleteDoc(doc(db, window.deleteTarget, d.id))));
        closeDeleteModal();
    };

    // --- UI & Logic Helpers ---
    window.getClassValue = (cls) => {
        const valMap = { 'BB': 1, 'BB+': 1.5, 'BG': 2, 'BG+': 2.5, 'N': 3, 'N+': 3.5, 'S': 4, 'S+': 4.5, 'P': 5 };
        return valMap[cls] || 1;
    };

    window.getPartnerCount = (p1, p2) => {
        let count = 0;
        window.fireMatches.forEach(m => {
            if((m.p1a===p1 && m.p2a===p2) || (m.p1a===p2 && m.p2a===p1)) count++;
            if((m.p1b===p1 && m.p2b===p2) || (m.p1b===p2 && m.p2b===p1)) count++;
        });
        return count;
    };

    window.getOpponentCount = (p1, p2) => {
        let count = 0;
        window.fireMatches.forEach(m => {
            const teamA = [m.p1a, m.p2a], teamB = [m.p1b, m.p2b];
            if ((teamA.includes(p1) && teamB.includes(p2)) || (teamB.includes(p1) && teamA.includes(p2))) count++;
        });
        return count;
    };

    // --- SMART MATCHMAKING (V6.2 STRICT) ---
    window.autoSuggestPlayers = (num) => {
        const box = document.querySelector(`.card[data-matchnum="${num}"]`);
        let excluded = [];
        document.querySelectorAll(`.card:not([data-matchnum="${num}"])`).forEach(c => {
            if(c.dataset.status === 'live' || c.dataset.status === 'draft' || c.dataset.editing === "true") {
                c.querySelectorAll('.p-select').forEach(s => { if(s.value) excluded.push(s.value); });
            }
        });

        let pool = window.allDataMemory.filter(m => m.Status === "Active" && !excluded.includes(m.Name));
        if(pool.length < 4) return alert("คนว่างไม่พอ 4 คน!");

        pool.sort((a, b) => a.TotalPlayed - b.TotalPlayed);
        const top4 = pool.slice(0, 4);
        
        const combos = [
            [top4[0], top4[1], top4[2], top4[3]], // (0,1) vs (2,3)
            [top4[0], top4[2], top4[1], top4[3]], // (0,2) vs (1,3)
            [top4[0], top4[3], top4[1], top4[2]]  // (0,3) vs (1,2)
        ];

        let bestCombo = combos[0];
        let minPenalty = Infinity;

        combos.forEach(c => {
            const v1a = window.getClassValue(c[0].Class), v2a = window.getClassValue(c[1].Class);
            const v1b = window.getClassValue(c[2].Class), v2b = window.getClassValue(c[3].Class);
            
            // กฎเหล็ก: ทีมเดียวกันห่างกันไม่เกิน 2 (เช็กทั้ง A และ B)
            let gapPenalty = 0;
            if (Math.abs(v1a - v2a) > 2) gapPenalty += 5000;
            if (Math.abs(v1b - v2b) > 2) gapPenalty += 5000;

            const teamDiff = Math.abs((v1a+v2a) - (v1b+v2b)) * 20;
            const history = (window.getPartnerCount(c[0].Name, c[1].Name) * 50) + (window.getPartnerCount(c[2].Name, c[3].Name) * 50);
            
            const total = teamDiff + history + gapPenalty;
            if(total < minPenalty) { minPenalty = total; bestCombo = c; }
        });

        const selects = box.querySelectorAll('.p-select');
        bestCombo.forEach((p, i) => { selects[i].value = p.Name; window.refreshSelectOptionsManual(selects[i]); });
    };

    window.renderMatchHistoryStrict = () => {
        const container = document.getElementById('matchContainer');
        const scroll = window.scrollY;
        
        // Keep drafts
        const drafts = Array.from(container.querySelectorAll('.card')).filter(c => c.dataset.status === 'draft' || c.dataset.editing === "true");
        container.innerHTML = "";
        drafts.forEach(d => container.appendChild(d));

        let highest = 0;
        window.fireMatches.forEach(m => {
            highest = Math.max(highest, m.matchNum);
            const box = createMatchElement(m.matchNum);
            box.dataset.docid = m.id;
            box.dataset.status = m.matchStatus;
            box.classList.toggle('is-live', m.matchStatus==='live');
            box.classList.toggle('is-saved', m.matchStatus==='saved');
            if(window.hideSavedMatches && m.matchStatus === 'saved') box.classList.add('hidden-match');

            // Badge
            const badge = document.createElement('span');
            badge.className = `status-badge ${m.matchStatus==='live'?'badge-live':'badge-saved'}`;
            badge.innerText = m.matchStatus==='live'?'กำลังแข่ง':'จบแล้ว';
            box.appendChild(badge);

            // Players
            const players = [m.p1a, m.p2a, m.p1b, m.p2b];
            box.querySelectorAll('.p-select').forEach((s, i) => {
                s.innerHTML = `<option>${players[i]}</option>`; s.value = players[i]; s.disabled = true;
                applyColorManual(s, players[i]);
            });

            // Winner
            const btnGroup = box.querySelector('.btn-group');
            btnGroup.dataset.winner = m.winner;
            btnGroup.querySelectorAll('.btn-choice').forEach(b => {
                const isW = (m.winner === 'Team A' && b.innerText.includes('A')) || (m.winner === 'Team B' && b.innerText.includes('B'));
                if(isW) b.classList.add('selected');
                b.disabled = true;
            });

            // UI Adjust
            box.querySelector('.action-row').style.display = (m.matchStatus === 'live') ? 'flex' : 'none';
            if(m.matchStatus === 'live') {
                const lb = box.querySelector('.btn-live-act');
                lb.innerText = "💾 บันทึกผล";
                lb.onclick = () => saveMatchBox(m.matchNum, 'saved');
                box.querySelector('.btn-suggest').style.display = 'none';
            } else {
                const ok = document.createElement('div'); ok.className = 'btn-saved-compact'; ok.innerText = '✓ บันทึกแล้ว';
                box.insertBefore(ok, box.querySelector('.btn-edit-link'));
            }
            box.querySelector('.btn-edit-link').style.display = 'block';
            container.appendChild(box);
        });
        window.globalNextMatchNum = highest + 1;
        window.scrollTo(0, scroll);
    };

    window.createMatchElement = (num) => {
        const div = document.createElement('div'); div.className = 'card'; div.dataset.matchnum = num; div.dataset.status = 'draft';
        div.innerHTML = `
            <div class="game-label">เกมที่ ${num}</div>
            <div class="match-grid">
                <div><select class="p-select" data-role="p1a" onchange="handleSel(this)"></select><select class="p-select" data-role="p2a" onchange="handleSel(this)"></select></div>
                <div class="vs-text">VS</div>
                <div><select class="p-select" data-role="p1b" onchange="handleSel(this)"></select><select class="p-select" data-role="p2b" onchange="handleSel(this)"></select></div>
            </div>
            <div class="btn-group"><button class="btn-choice" onclick="setWin(this,'Team A')">A ชนะ</button><button class="btn-choice" onclick="setWin(this,'Team B')">B ชนะ</button></div>
            <div class="action-row">
                <button class="btn-suggest" onclick="autoSuggestPlayers(${num})">🤖</button>
                <button class="btn-main btn-live-act" onclick="saveMatchBox(${num}, 'live')">▶ ลงสนาม</button>
            </div>
            <button class="btn-edit-link" onclick="editMatch(${num})">แก้ไขข้อมูล</button>`;
        return div;
    };

    window.editMatch = (num) => {
        const box = document.querySelector(`.card[data-matchnum="${num}"]`);
        box.dataset.editing = "true";
        box.querySelectorAll('select, .btn-choice').forEach(e => e.disabled = false);
        box.querySelector('.action-row').style.display = 'flex';
        box.querySelector('.btn-suggest').style.display = 'flex';
        const lb = box.querySelector('.btn-live-act'); lb.innerText = "💾 บันทึกแก้ไข"; lb.onclick = () => saveMatchBox(num, 'live');
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.addNewManualBox = () => {
        const box = createMatchElement(window.globalNextMatchNum++);
        document.getElementById('matchContainer').appendChild(box);
        box.querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s));
    };

    window.refreshSelectOptionsManual = (sel) => {
        const val = sel.value, box = sel.closest('.card');
        const taken = Array.from(box.querySelectorAll('.p-select')).map(s => s.value).filter(v => v && v !== val);
        sel.innerHTML = '<option value="">- เลือก -</option>';
        window.allDataMemory.filter(m => m.Status === "Active").forEach(m => {
            if(!taken.includes(m.Name)) sel.appendChild(new Option(`${m.Name} [${m.Class}]`, m.Name));
        });
        sel.value = val; applyColorManual(sel, val);
    };

    window.applyColorManual = (el, name) => {
        const m = window.allDataMemory.find(i => i.Name === name);
        const cls = m ? m.Class.toLowerCase().replace('+', '') : '';
        el.style.borderLeftColor = m ? `var(--cls-${cls})` : 'transparent';
    };

    window.handleSel = (el) => { el.closest('.card').querySelectorAll('.p-select').forEach(s => window.refreshSelectOptionsManual(s)); };
    window.setWin = (btn, team) => { btn.parentElement.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); btn.parentElement.dataset.winner = team; };
    
    window.renderMemberList = () => {
        const body = document.getElementById('memberListBody');
        const head = document.getElementById('memberListHead');
        const arrow = window.currentSort.direction === 'asc' ? '↑' : '↓';
        head.innerHTML = `<tr><th onclick="setSort('Name')">ชื่อ ${window.currentSort.key==='Name'?arrow:''}</th><th>เกม</th><th>Win%</th><th>แก้ไข</th><th>สถานะ</th></tr>`;
        
        let data = [...window.allDataMemory].sort((a,b) => {
            if(a.Status !== b.Status) return a.Status === 'Active' ? -1 : 1;
            let va = a[window.currentSort.key], vb = b[window.currentSort.key];
            return window.currentSort.direction === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
        });

        body.innerHTML = data.map(m => `
            <tr>
                <td style="text-align:left; padding-left:10px;"><span class="status-dot ${m.Status==='Active'?'dot-active':'dot-off'}"></span><b>${m.Name}</b> <small class="txt-${m.Class.toLowerCase().replace('+','')}">[${m.Class}]</small></td>
                <td>${m.TotalPlayed}</td>
                <td>${m.WinRate}%</td>
                <td><button onclick="editMember('${m.id}')" style="background:none; border:none; color:var(--warning); text-decoration:underline;">แก้</button></td>
                <td><button class="btn-status ${m.Status==='Active'?'btn-out':'btn-in'}" onclick="quickStatusUpdate('${m.Name}','${m.Status==='Active'?'checkout':'in'}')">${m.Status==='Active'?'ออก':'เข้า'}</button></td>
            </tr>
        `).join('');
    };

    window.editMember = (id) => {
        const m = window.fireMembers.find(i => i.id === id);
        document.getElementById('edit_mem_id').value = m.id;
        document.getElementById('mem_name').value = m.name;
        document.getElementById('mem_class').value = m.class;
        document.getElementById('mem_note').value = m.note || "";
        document.getElementById('formActions').innerHTML = `<button class="btn-main" onclick="updateMemberData()" style="background:var(--warning); color:#000;">💾 อัปเดต</button><button class="btn-main" onclick="cancelEditMember()" style="background:#4f545c; margin-top:5px;">ยกเลิก</button>`;
    };
    window.cancelEditMember = () => { document.getElementById('formActions').innerHTML = `<button class="btn-main" onclick="registerMember()">+ เพิ่มสมาชิก</button>`; document.getElementById('mem_name').value=""; };
    window.setSort = (k) => { window.currentSort.direction = (window.currentSort.key===k && window.currentSort.direction==='desc') ? 'asc' : 'desc'; window.currentSort.key=k; renderMemberList(); };
    window.showPage = (n) => { document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i+1===n)); document.querySelectorAll('.nav-item').forEach((p,i) => p.classList.toggle('active', i+1===n)); };
    window.toggleHideSaved = () => { window.hideSavedMatches = !window.hideSavedMatches; document.getElementById('toggleHideBtn').innerText = window.hideSavedMatches ? "👁️ แสดงทั้งหมด" : "👁️ ซ่อนที่จบแล้ว"; renderMatchHistoryStrict(); };
    window.openStats = () => { 
        document.getElementById('statsModal').style.display="flex"; 
        document.getElementById('statsListHead').innerHTML = `<tr><th style="text-align:left;">ชื่อ</th><th>คลาส</th><th>เกม</th><th>Win%</th></tr>`;
        document.getElementById('miniStatsTableBody').innerHTML = window.allDataMemory.filter(m=>m.Status==='Active').sort((a,b)=>b.WinRate-a.WinRate).map(m=>`<tr><td style="text-align:left; padding-left:10px;">${m.Name}</td><td class="txt-${m.Class.toLowerCase().replace('+','')}">${m.Class}</td><td>${m.TotalPlayed}</td><td>${m.WinRate}%</td></tr>`).join('');
    };
    window.closeStats = () => document.getElementById('statsModal').style.display="none";
    window.openDeleteModal = (t) => { window.deleteTarget=t; document.getElementById('deleteModal').style.display="flex"; };
    window.closeDeleteModal = () => document.getElementById('deleteModal').style.display="none";
    window.checkDeleteInput = () => document.getElementById('btnConfirmDelete').disabled = document.getElementById('deleteConfirmInput').value!=="delete";
</script>
</body>
</html>
